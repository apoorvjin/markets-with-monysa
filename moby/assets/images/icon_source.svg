<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>

    <!-- ── Background ────────────────────────────────────────── -->
    <radialGradient id="bg" cx="50%" cy="44%" r="66%">
      <stop offset="0%"   stop-color="#0D1B26"/>
      <stop offset="55%"  stop-color="#070E16"/>
      <stop offset="100%" stop-color="#020406"/>
    </radialGradient>

    <!-- ── Specular shine overlay (top-to-transparent) ──────── -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </linearGradient>

    <!-- ── Left bar ──────────────────────────────────────────── -->
    <linearGradient id="barL" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%"   stop-color="#00CEA2"/>
      <stop offset="100%" stop-color="#005646"/>
    </linearGradient>

    <!-- ── Middle bar (brightest) ────────────────────────────── -->
    <linearGradient id="barM" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#00F0C6"/>
      <stop offset="38%"  stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00785E"/>
    </linearGradient>

    <!-- ── Right bar ─────────────────────────────────────────── -->
    <linearGradient id="barR" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%"   stop-color="#00AE88"/>
      <stop offset="100%" stop-color="#004A3A"/>
    </linearGradient>

    <!-- ── Ambient background bloom ─────────────────────────── -->
    <filter id="bloom" x="-80%" y="-50%" width="260%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="55"/>
    </filter>

    <!-- ── Per-bar glow halo ──────────────────────────────────── -->
    <filter id="halo" x="-70%" y="-35%" width="240%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- ── Bottom edge soft gradient (grounds the bars) ──────── -->
    <linearGradient id="groundFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00D4AA" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0.10"/>
    </linearGradient>

    <!-- ── Rounded-square clip ───────────────────────────────── -->
    <clipPath id="iconShape">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>

  </defs>

  <!-- ── Layer 0: background ──────────────────────────────────── -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- ── Layer 1: ambient center bloom ────────────────────────── -->
  <ellipse cx="512" cy="530" rx="310" ry="380"
           fill="#00D4AA" opacity="0.07" filter="url(#bloom)"/>

  <!-- ── Layer 2: glow halos ──────────────────────────────────── -->
  <rect x="217" y="409" width="170" height="461" rx="85"
        fill="#00CEA2" opacity="0.28" filter="url(#halo)"/>
  <rect x="427" y="204" width="170" height="666" rx="85"
        fill="#00D4AA" opacity="0.34" filter="url(#halo)"/>
  <rect x="637" y="307" width="170" height="563" rx="85"
        fill="#00AE88" opacity="0.26" filter="url(#halo)"/>

  <!-- ── Layer 3: bars ─────────────────────────────────────────── -->

  <!-- Left bar -->
  <rect x="217" y="409" width="170" height="461" rx="85" fill="url(#barL)"/>
  <!-- Left bar specular shine -->
  <rect x="217" y="409" width="170" height="461" rx="85" fill="url(#shine)"/>

  <!-- Middle bar -->
  <rect x="427" y="204" width="170" height="666" rx="85" fill="url(#barM)"/>
  <!-- Middle bar specular shine -->
  <rect x="427" y="204" width="170" height="666" rx="85" fill="url(#shine)"/>

  <!-- Right bar -->
  <rect x="637" y="307" width="170" height="563" rx="85" fill="url(#barR)"/>
  <!-- Right bar specular shine -->
  <rect x="637" y="307" width="170" height="563" rx="85" fill="url(#shine)"/>

  <!-- ── Layer 4: ground reflection glow strip ─────────────────── -->
  <rect x="100" y="820" width="824" height="100"
        fill="url(#groundFade)" opacity="0.6"/>

</svg>
